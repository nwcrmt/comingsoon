<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWC Registered Massage Therapy — Coming Soon</title>
<meta name="description" content="NWC Registered Massage Therapy. Mobile RMT serving Wasaga Beach, Collingwood, Barrie and surrounding areas. Launching Fall 2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ─── TOKENS ─── */
:root {
  --yellow:  #F5F171;
  --blue:    #00A9F2;
  --ink:     #0D1A12;
  --linen:   #F2EDE4;
  --mid:     #4A5244;
  --f-serif: 'Cormorant Garamond', Georgia, serif;
  --f-mono:  'Space Mono', 'Courier New', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--f-serif);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ─── FULL-BLEED DARK BACKGROUND ─── */
body {
  background: var(--ink);
  color: var(--linen);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── AMBIENT GLOW ─── */
.glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.glow::before {
  content: '';
  position: absolute;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 70vw;
  height: 70vw;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,169,242,0.08) 0%, transparent 70%);
  animation: pulse 8s ease-in-out infinite;
}
.glow::after {
  content: '';
  position: absolute;
  bottom: -20%;
  left: 30%;
  width: 50vw;
  height: 50vw;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,241,113,0.06) 0%, transparent 70%);
  animation: pulse 10s ease-in-out infinite reverse;
}
@keyframes pulse {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50%       { opacity: 1;   transform: translateX(-50%) scale(1.08); }
}

/* ─── GRAIN OVERLAY ─── */
.grain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  opacity: 0.35;
  mix-blend-mode: overlay;
}

/* ─── STAGE ─── */
.stage {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 2rem;
  max-width: 600px;
  width: 100%;
}

/* ─── LOGO ─── */
.logo-wrap {
  margin-bottom: 2.5rem;
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) both;
}
.logo-img {
  width: 110px;
  height: auto;
  display: block;
  margin: 0 auto;
  border-radius: 50%;
}

/* ─── WORDMARK ─── */
.wordmark {
  margin-bottom: 0.5rem;
  animation: fadeUp 1s 0.15s cubic-bezier(0.16,1,0.3,1) both;
}
.wordmark-primary {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.1;
  color: var(--linen);
}
.wordmark-primary em {
  font-style: italic;
  color: var(--yellow);
}
.wordmark-sub {
  display: block;
  margin-top: 0.4rem;
  font-family: var(--f-mono);
  font-size: 0.5625rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--blue);
  opacity: 0.85;
}

/* ─── DIVIDER ─── */
.divider {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, transparent, rgba(245,241,113,0.4), transparent);
  margin: 2rem auto;
  animation: fadeUp 1s 0.3s cubic-bezier(0.16,1,0.3,1) both;
}

/* ─── COMING SOON ─── */
.headline {
  animation: fadeUp 1s 0.4s cubic-bezier(0.16,1,0.3,1) both;
}
.headline-label {
  display: block;
  font-family: var(--f-mono);
  font-size: 0.5rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 0.75rem;
}
.headline-text {
  font-size: clamp(2.8rem, 10vw, 5.5rem);
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--linen);
}
.headline-text em {
  font-style: italic;
  color: var(--yellow);
}

/* ─── DATE BADGE ─── */
.date-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  margin-top: 2.25rem;
  padding: 0.6rem 1.4rem;
  border: 1px solid rgba(0,169,242,0.35);
  background: rgba(0,169,242,0.06);
  animation: fadeUp 1s 0.55s cubic-bezier(0.16,1,0.3,1) both;
}
.date-badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--blue);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}
.date-badge-text {
  font-family: var(--f-mono);
  font-size: 0.6875rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--blue);
}

/* ─── SERVICE AREA FOOTNOTE ─── */
.footnote {
  margin-top: 3rem;
  font-family: var(--f-mono);
  font-size: 0.5rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(242,237,228,0.3);
  animation: fadeUp 1s 0.7s cubic-bezier(0.16,1,0.3,1) both;
}

/* ─── KEYFRAME ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── MOBILE ─── */
@media (max-width: 480px) {
  body { overflow: auto; }
  html, body { height: auto; min-height: 100dvh; }
  .stage { padding: 3.5rem 1.5rem 4rem; }
  .logo-img { width: 88px; }
  .headline-text { font-size: clamp(2.4rem, 14vw, 3.5rem); }
}

/* ─── REDUCED MOTION ─── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; }
}
</style>
</head>
